name: Build Portable Linux Executable

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    
    # THE MAGIC: Run this entire job inside an older Docker container
    # python:3.11-buster is Debian 10, which uses the very old glibc 2.28
    container:
      image: python:3.11-buster

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        # We are root inside the container, so no 'sudo' is needed
        apt-get update
        apt-get install -y build-essential libffi-dev libssl-dev

    - name: Install Python Dependencies and PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Executable
      run: |
        cd Linux
        echo "[*] Running PyInstaller inside Debian 10 container..."
        pyinstaller --onefile laZagne.py 

    - name: Upload Executable as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LaZagne-Linux-Portable
        path: Linux/dist/laZagne
