name: Build Statically Linked Linux Executable

on:
  workflow_dispatch:  # Allows manual triggering
  push:
    branches:
      - master
      - main

jobs:
  build:
    # También esta ubuntu-latest
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      # We need 'patchelf' because StaticX uses it to rewrite the ELF binary headers
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3-dev libffi-dev libssl-dev patchelf

    - name: Install Python Dependencies, PyInstaller, and StaticX
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller staticx

    - name: Build and Statically Link Executable
      run: |
        cd Linux
        
        # 1. Build the standard dynamic PyInstaller binary first
        echo "[*] Running PyInstaller..."
        pyinstaller --onefile laZagne.py 
        
        # 2. Use StaticX to bundle glibc and create a fully static executable
        echo "[*] Running StaticX..."
        staticx dist/laZagne dist/laZagne-static

    - name: Upload Static Executable as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LaZagne-Linux-Static
        # Upload the new staticx-generated file instead of the PyInstaller one
        path: Linux/dist/laZagne-static
