name: Build Portable Linux Executable

on:
  workflow_dispatch:
  #push:
  #  branches:
  #    - master
  #    - main

jobs:
  build:
    runs-on: ubuntu-22.04
    
    # Using Debian 11 (Bullseye) container to maintain glibc 2.31 portability
    container:
      image: python:3.11-bullseye

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        # We are root inside the container, so no 'sudo' is needed
        apt-get update
        apt-get install -y build-essential libffi-dev libssl-dev

    - name: Install Python Dependencies and PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Executable
      run: |
        cd Linux
        echo "[*] Running PyInstaller with official project hooks..."
        
        # THE FIX: We are now explicitly telling PyInstaller to look in the current 
        # directory (.) for the author's custom hook files before building.
        pyinstaller --additional-hooks-dir=. -F --onefile laZagne.py 

    - name: Upload Executable as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LaZagne-Linux-Portable
        path: Linux/dist/laZagne
